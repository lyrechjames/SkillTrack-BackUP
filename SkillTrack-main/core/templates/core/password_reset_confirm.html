<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password</title>
    <style>
        :root {
            --bg: #f5f7ff;
            --panel: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(244, 247, 255, 0.92));
            --text: #17212b;
            --muted: #64748b;
            --primary: #6366f1;
            --primary-dark: #4f46e5;
        }
        * { box-sizing: border-box; }
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at top left, rgba(99, 102, 241, 0.4), transparent 24%),
                radial-gradient(circle at bottom right, rgba(45, 212, 191, 0.3), transparent 26%),
                linear-gradient(180deg, #eff6ff 0%, #f8fbff 45%, #eef2ff 100%);
            color: var(--text);
            font-family: 'Segoe UI', Inter, Arial, Helvetica, sans-serif;
        }
        .screen {
            width: min(92vw, 420px);
            padding: 36px;
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.55);
            border-radius: 24px;
            box-shadow: 0 18px 60px rgba(99, 102, 241, 0.18);
        }
        h1 {
            margin: 0 0 18px;
            text-align: center;
            font-size: 2rem;
            letter-spacing: -0.04em;
        }
        form p {
            margin: 0 0 14px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
        }
        input {
            width: 100%;
            min-height: 56px;
            padding: 14px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
        }
        button {
            width: 100%;
            min-height: 56px;
            margin-top: 18px;
            border: 0;
            border-radius: 16px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 12px 28px rgba(99, 102, 241, 0.24);
        }
        p { color: var(--muted); }
        a { color: var(--primary-dark); font-weight: 700; }
    </style>
</head>
<body>
    <main class="screen">
        <h1>Set New Password</h1>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Save New Password</button>
        </form>
    </main>
</body>
</html>

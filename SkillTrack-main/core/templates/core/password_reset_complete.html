<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete</title>
    <style>
        :root {
            --bg: #f5f7ff;
            --panel: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(244, 247, 255, 0.92));
            --text: #17212b;
            --muted: #64748b;
            --primary: #6366f1;
            --primary-dark: #4f46e5;
        }
        * { box-sizing: border-box; }
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at top left, rgba(99, 102, 241, 0.4), transparent 24%),
                radial-gradient(circle at bottom right, rgba(45, 212, 191, 0.3), transparent 26%),
                linear-gradient(180deg, #eff6ff 0%, #f8fbff 45%, #eef2ff 100%);
            color: var(--text);
            font-family: 'Segoe UI', Inter, Arial, Helvetica, sans-serif;
        }
        .screen {
            width: min(92vw, 420px);
            padding: 36px;
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.55);
            border-radius: 24px;
            box-shadow: 0 18px 60px rgba(99, 102, 241, 0.18);
        }
        .success-badge {
            width: 72px;
            height: 72px;
            margin: 0 auto 16px;
            display: grid;
            place-items: center;
            border-radius: 18px;
            background: linear-gradient(135deg, #10b981, #14b8a6);
            color: #fff;
            font-size: 2.2rem;
        }
        h1 {
            margin: 0 0 12px;
            text-align: center;
            font-size: 2rem;
            letter-spacing: -0.04em;
        }
        p {
            margin: 0;
            color: var(--muted);
            text-align: center;
        }
        a {
            display: inline-block;
            margin-top: 22px;
            color: var(--primary-dark);
            font-weight: 700;
            text-decoration: none;
        }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <main class="screen">
        <div class="success-badge" aria-hidden="true">✓</div>
        <h1>Password Reset Complete</h1>
        <p>Your password has been set. You can now sign in with your new password.</p>
        <p><a href="{% url 'login' %}">Return to Sign In</a></p>
    </main>
</body>
</html>

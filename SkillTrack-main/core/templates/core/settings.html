{% extends 'core/base.html' %}{% block title %}Settings | SkillTrack{% endblock %}{% block content %}
<h1>Account Settings</h1><section class="panel"><h2>Profile details</h2><form method="post">{% csrf_token %}<input type="hidden" name="action" value="update_profile"><label>First name</label><input name="first_name" value="{{ user.first_name }}" required><label>Last name</label><input name="last_name" value="{{ user.last_name }}"><label>Email</label><input type="email" name="email" value="{{ user.email }}" required><button>Save profile</button></form></section><section class="panel"><h2>Change password</h2><form method="post">{% csrf_token %}<input type="hidden" name="action" value="change_password"><label>Current password</label><input type="password" name="current_password" required><label>New password</label><input type="password" name="new_password" required><label>Confirm new password</label><input type="password" name="confirm_new_password" required><button>Update password</button></form></section>
{% endblock %}
